<svg width="800" height="240" viewBox="0 0 800 240" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Glowing Orbs for the Mesh Gradient effect -->
    <radialGradient id="glowGreen" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3FB950" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#3FB950" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="glowDarkGreen" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2EA043" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#2EA043" stop-opacity="0" />
    </radialGradient>

    <!-- Scanning Line Gradient -->
    <linearGradient id="scannerGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="rgba(63,185,80,0)" />
      <stop offset="50%" stop-color="rgba(63,185,80,0.8)" />
      <stop offset="100%" stop-color="rgba(63,185,80,0)" />
    </linearGradient>

    <clipPath id="roundedClip">
      <rect width="800" height="240" rx="12" />
    </clipPath>

    <style>
      @keyframes pulseGreen {
        0% { transform: scale(1); opacity: 0.8; }
        50% { transform: scale(1.3); opacity: 1; }
        100% { transform: scale(1); opacity: 0.8; }
      }
      @keyframes pulseDarkGreen {
        0% { transform: scale(1.2); opacity: 1; }
        50% { transform: scale(0.9); opacity: 0.8; }
        100% { transform: scale(1.2); opacity: 1; }
      }
      @keyframes scanVertical {
        0% { transform: translateY(-10px); opacity: 0; }
        10% { opacity: 1; }
        90% { opacity: 1; }
        100% { transform: translateY(250px); opacity: 0; }
      }
      
      .g-green { animation: pulseGreen 8s ease-in-out infinite; transform-origin: center; }
      .g-darkgreen { animation: pulseDarkGreen 10s ease-in-out infinite; transform-origin: center; }
      .scanner-line { animation: scanVertical 4s cubic-bezier(0.4, 0, 0.2, 1) infinite; }
      
      .title {
        font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        font-size: 52px;
        font-weight: 800;
        fill: #FFFFFF;
        letter-spacing: -2px;
      }
      .subtitle {
        font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        font-size: 13px;
        font-weight: 600;
        fill: #888888;
        letter-spacing: 6px;
      }
      .badge-text {
        font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, sans-serif;
        font-size: 11px;
        font-weight: 700;
        fill: #3FB950;
        letter-spacing: 1.5px;
      }
    </style>
  </defs>

  <rect width="800" height="240" fill="#000000" rx="12" />

  <g clip-path="url(#roundedClip)">
    <circle cx="250" cy="120" r="300" fill="url(#glowGreen)" class="g-green" />
    <circle cx="550" cy="120" r="350" fill="url(#glowDarkGreen)" class="g-darkgreen" />

    <g stroke="rgba(255,255,255,0.03)" stroke-width="1">
      <path d="M 0 40 L 800 40 M 0 80 L 800 80 M 0 120 L 800 120 M 0 160 L 800 160 M 0 200 L 800 200" />
      <path d="M 100 0 L 100 240 M 200 0 L 200 240 M 300 0 L 300 240 M 400 0 L 400 240 M 500 0 L 500 240 M 600 0 L 600 240 M 700 0 L 700 240" />
    </g>

    <rect x="0" y="0" width="800" height="2" fill="url(#scannerGlow)" class="scanner-line" />

    <g transform="translate(400, 120)">
      <rect x="-70" y="-80" width="140" height="26" rx="13" fill="rgba(63, 185, 80, 0.08)" stroke="rgba(63, 185, 80, 0.4)" stroke-width="1" />
      <text x="0" y="-63" text-anchor="middle" class="badge-text">ECOSYSTEM</text>

      <text x="0" y="20" text-anchor="middle" class="title">TG-Radar Plugins</text>
      
      <text x="0" y="65" text-anchor="middle" class="subtitle">OFFICIAL EXTENSION REPOSITORY</text>
    </g>
  </g>
  
  <rect width="798" height="238" x="1" y="1" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="2" rx="11" />
</svg>